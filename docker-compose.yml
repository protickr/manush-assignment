services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: protick
      POSTGRES_PASSWORD: Pro@1234!
      POSTGRES_DB: retailers_sr_manush
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://protick:Pro%401234%21@postgres:5432/retailers_sr_manush
      HOST: 0.0.0.0
      PORT: 8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BCRYPT_SALT_ROUNDS: 10
      JWT_SECRET: MeUkymE7xUtpkAZF8ycQgPjLqPb0A1xzIakHErbSDd0=
      JWT_EXPIRES_IN: 3600
      CACHE_TTL: 3600

volumes:
  pgdata:
